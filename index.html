<!DOCTYPE html>
<html>
<head>
  <title>Kaizen Report Form</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { background: maroon; color: white; text-align: center; padding: 10px; }
    table { width: 100%; border-collapse: collapse; }
    td, th { border: 1px solid black; padding: 6px; }
    input, textarea, select { width: 100%; border: none; padding: 5px; }
    textarea { height: 80px; }
    .section { background: #d9ead3; font-weight: bold; text-align: center; }
    .btn { background: green; color: white; padding: 12px; border: none; width: 100%; font-size: 16px; }
  </style>
</head>

<body>

<h1>KAIZEN REPORT FORM</h1>

<h3 id="kaizenNo">Kaizen No: Generating...</h3>

<table>

<tr class="section"><td colspan="6">General Information</td></tr>

<tr>
  <td>Date</td>
  <td><input type="date" id="date"></td>
  <td>Zone</td>
  <td>
    <select id="zone">
      <option>ZONE 1</option>
      <option>ZONE 2</option>
    </select>
  </td>
  <td>Department</td>
  <td>Assembly</td>
</tr>

<tr>
  <td>Zone Leader</td>
  <td colspan="2">
    <select id="zoneLeader">
      <option>Mr. Arjun Vaghela</option>
      <option>Mr. Naresh Mamiya</option>
    </select>
  </td>

  <td>Assembly</td>
  <td colspan="2">
    <select id="assembly">
      <option>Assembly A</option>
      <option>Assembly B</option>
    </select>
  </td>
</tr>

<tr>
  <td>Type</td>
  <td colspan="5">
    <label><input type="radio" name="type" value="Internal"> Internal</label>
    <label><input type="radio" name="type" value="External"> External</label>
  </td>
</tr>

<tr class="section"><td colspan="6">Kaizen Category</td></tr>

<tr>
  <td colspan="6">
    <label><input type="checkbox"> Productivity</label>
    <label><input type="checkbox"> Quality</label>
    <label><input type="checkbox"> Safety</label>
    <label><input type="checkbox"> Cost</label>
    <label><input type="checkbox"> Environment</label>
  </td>
</tr>

<tr class="section">
  <td colspan="3">Before Improvement</td>
  <td colspan="3">After Improvement</td>
</tr>

<tr>
  <td colspan="3">
    <textarea id="problem" placeholder="Enter problem..."></textarea>
  </td>
  <td colspan="3">
    <textarea id="solution" placeholder="Enter solution..."></textarea>
  </td>
</tr>

<tr>
  <td colspan="3">
    <input type="file" id="beforeImage">
  </td>
  <td colspan="3">
    <input type="file" id="afterImage">
  </td>
</tr>

<tr class="section"><td colspan="6">Score</td></tr>

<tr>
  <td colspan="6">
    <select id="score">
      <option value="1">1 - Basic</option>
      <option value="2">2 - Moderate</option>
      <option value="3">3 - Good</option>
      <option value="4">4 - Excellent</option>
    </select>
  </td>
</tr>

<tr>
  <td colspan="6">
    <button class="btn" onclick="submitForm()">Submit Kaizen</button>
  </td>
</tr>

</table>

<script>

// 🔥 YOUR POWER AUTOMATE URL
const FLOW_URL = "https://default8402d370fd9c474580dbbf24428092.b6.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/d70365a7fbe348e8ad6a9752439cad16/triggers/manual/paths/invoke?api-version=1";

// Generate Kaizen ID once
const kaizenID = generateID();
document.getElementById("kaizenNo").innerText =
  "Kaizen No: " + kaizenID;

function generateID() {
  const year = new Date().getFullYear();
  const num = Math.floor(Math.random() * 10000);
  return `KZN-${year}-${String(num).padStart(4,'0')}`;
}

function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
  });
}

async function submitForm() {

  // Validation
  if (!document.getElementById("date").value) {
    alert("Please select date");
    return;
  }

  const before = document.getElementById("beforeImage").files[0];
  const after = document.getElementById("afterImage").files[0];

  const data = {
    kaizenID: kaizenID,
    date: document.getElementById("date").value,
    zone: document.getElementById("zone").value,
    zoneLeader: document.getElementById("zoneLeader").value,
    assembly: document.getElementById("assembly").value,
    type: document.querySelector('input[name="type"]:checked')?.value || "",
    problem: document.getElementById("problem").value,
    solution: document.getElementById("solution").value,
    score: document.getElementById("score").value,
    beforeImage: before ? await toBase64(before) : "",
    afterImage: after ? await toBase64(after) : ""
  };

  try {
    await fetch(FLOW_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data),
      mode: "no-cors" // IMPORTANT for your URL
    });

    alert("✅ Submitted Successfully!");
  } catch (err) {
    alert("❌ Submission failed");
    console.error(err);
  }
}

</script>

</body>
</html>
